name: SeleniumBrowser

on:
  schedule:
    # 每10天运行：1号、11号、21号 中午12:12 (北京时间)
    # UTC 时间 = 北京时间 - 8小时 = 04:12
    - cron: '55 8 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    name: Run Jobs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    concurrency:
      group: browser-login
      cancel-in-progress: false

    steps:
      - name: checkout Repository
        uses: actions/checkout@v4

      - name: Setting Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Selenium
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          pip install seleniumbase>=4.25.0 pyvirtualdisplay>=3.0 requests>=2.31.0

      - name: Configure proxy
        env:
          HY2_URL: ${{ vars.HY2_URL }}
        run: |
          if [ -z "$HY2_URL" ]; then
            echo "HY2_URL 未设置，跳过代理配置，使用直连模式"
            echo "PROXY_SERVER=" >> $GITHUB_ENV
            exit 0
          fi
          wget -q https://github.com/apernet/hysteria/releases/download/app/v2.8.0/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria

          URL="${HY2_URL#hysteria2://}"
          PASSWORD="${URL%%@*}"
          SERVER="${URL#*@}"; SERVER="${SERVER%%\?*}"
          SNI=$(echo "$URL" | grep -oP 'sni=\K[^&]+' || echo "${SERVER%%:*}")
          cat $SERVER > server.txt
          curl -s "http://${SERVER}/start"

          cat > hy2.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: true
          http:
            listen: 127.0.0.1:7890
          EOF

          ./hysteria client --disable-update-check -c hy2.yaml &
          sleep 3
          echo "PROXY_SERVER=http://127.0.0.1:7890" >> $GITHUB_ENV

      - name: Perform Task
        env:
          ACCOUNTS: ${{ vars.ACCOUNTS }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TG_API: ${{ vars.TG_API }}
        run: python browser.py


      # - name: Upload Test Images
      #   uses: actions/upload-artifact@v4
      #   if: always()
      #   with:
      #      name: screenshots-${{ github.run_number }}
      #      path: output/screenshots/
      #      retention-days: 3
      - name: Close Proxy
        run: |
          SERVER=$(cat server.txt)
          curl -s http://${SERVER}/stop
          
      - name: Clean Jobs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
